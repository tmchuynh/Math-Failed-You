<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Closing - You're Not Bad at Math</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=Lora:ital,wght@1,400;1,500&amp;family=Space+Grotesk:wght@400;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <link href="./main.css" rel="stylesheet" />
    <style>
        .slide-container {
            background-color: #111827;
            color: white;
        }

        /* Background Pattern */
        .bg-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.05;
            background-image: radial-gradient(#ffffff 1px, transparent 1px);
            background-size: 30px 30px;
            /* Fallback for no-gradient requirement: using SVG instead in HTML */
            background-image: none;
        }

        .bg-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.08;
        }

        /* Main Content Wrapper */
        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 0 100px;
            text-align: center;
        }

        /* Typography */
        .main-headline {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 72px;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 24px;
            letter-spacing: -2px;
            background-color: transparent;
        }

        .sub-headline {
            font-family: 'Lora', serif;
            font-size: 28px;
            font-weight: 400;
            font-style: italic;
            color: #9ca3af;
            max-width: 900px;
            line-height: 1.6;
            margin-bottom: 60px;
        }

        .highlight {
            color: #ef4444;
        }

        /* The Pivot Box */
        .pivot-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            width: 100%;
            max-width: 800px;
        }

        .pivot-line {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            font-size: 32px;
            font-weight: 500;
        }

        .label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            width: 150px;
            text-align: right;
            font-family: 'Inter', sans-serif;
        }

        .quote-text {
            font-family: 'Space Grotesk', sans-serif;
            flex: 1;
            text-align: left;
        }

        .bad-quote {
            color: #6b7280;
            text-decoration: line-through;
            text-decoration-color: #ef4444;
            text-decoration-thickness: 3px;
            opacity: 0.6;
        }

        .good-quote {
            color: white;
            font-weight: 700;
            position: relative;
        }

        .good-quote::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 70%;
            height: 2px;
            background-color: #ef4444;
        }

        .arrow-icon {
            color: #ef4444;
            font-size: 24px;
            margin-left: -10rem;
            opacity: 0.8;
        }

        /* Footer */
        .footer {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .thank-you {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 18px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #4b5563;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #ef4444;
            border-radius: 50%;
        }

        /* Decorative Elements */
        .circle-accent {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.03);
            top: -200px;
            right: -100px;
            z-index: 1;
        }

        .circle-accent-2 {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.03);
            bottom: -150px;
            left: -100px;
            z-index: 1;
        }
    </style>
</head>

<body>
    <div class="slide-container">
        <!-- Background Grid SVG -->
        <svg class="bg-svg" height="100%" width="100%" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <pattern height="40" id="grid" patternunits="userSpaceOnUse" width="40">
                    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5"></path>
                </pattern>
            </defs>
            <rect fill="url(#grid)" height="100%" width="100%"></rect>
        </svg>
        <!-- Abstract Circles -->
        <div class="circle-accent"></div>
        <div class="circle-accent-2"></div>
        <!-- Main Content -->
        <div class="content-wrapper">
            <h1 class="main-headline">
                You're not bad at math.
            </h1>
            <p class="sub-headline">
                You already think mathematically every day. Learn the dialect, and the field opens up.
            </p>
            <div class="pivot-container">
                <!-- Row 1: The Old Way -->
                <div class="pivot-line">
                    <span class="text-gray-500 label">Stop saying</span>
                    <span class="quote-text bad-quote">"I'm bad at math."</span>
                </div>
                <!-- Arrow -->
                <div class="arrow-container">
                    <i class="fas fa-arrow-down arrow-icon"></i>
                </div>
                <!-- Row 2: The New Way -->
                <div class="pivot-line">
                    <span class="highlight label">Start saying</span>
                    <span class="quote-text good-quote">"I'm learning the language."</span>
                </div>
            </div>
        </div>
        <!-- Footer -->
        <div class="footer">
            <div class="thank-you">
                <div class="dot"></div>
                <span>Thank You</span>
                <div class="dot"></div>
            </div>
        </div>
    </div>
</body>

</html>
