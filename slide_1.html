<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Title Slide</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&amp;family=Lora:ital,wght@1,400&amp;display=swap"
        rel="stylesheet" />
    <link href="./main.css" rel="stylesheet" />
    <style>
        .main-title {
            font-size: 96px;
            font-weight: 900;
            line-height: 1.1;
            color: #111111;
            letter-spacing: -2px;
            margin-bottom: 24px;
        }

        .subtitle {
            font-size: 32px;
            font-weight: 400;
            color: #4b5563;
            line-height: 1.4;
            max-width: 900px;
            margin-bottom: 60px;
        }

        .math-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23000000' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            z-index: 0;
        }
    </style>
</head>

<body>
    <div class="slide-container">
        <!-- Background Elements -->
        <div class="math-bg"></div>
        <div class="decorative-shape"></div>
        <div class="decorative-shape-2"></div>
        <div class="accent-bar"></div>
        <div class="content-wrapper">
            <h1 class="main-title">
                <p>Math Didn't<br />Fail You —</p>
                <p class="highlight">Language Did.</p>
            </h1>
            <div class="subtitle">
                <p>The barrier between "everyday people" and "advanced mathematics" is largely linguistic and
                    psychological, not conceptual.</p>
            </div>
            <div class="meta-info">
                <p>A Perspective On Math From A Girl Tired of Being the Only One Excited About It</p>
            </div>
        </div>
    </div>
</body>

</html>
